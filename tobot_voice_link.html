  #page{ max-width:1080px; margin:0 auto; padding:18px 16px 40px; position:relative; }

  /* ---------- banner ---------- */
  .banner-wrap{ width:100%; text-align:center; margin-bottom:10px; }
  .banner-wrap img{ width:100%; max-width:700px; height:auto; border-radius:8px; box-shadow:0 8px 30px rgba(75,47,214,0.35); }

  /* ---------- nav tabs ---------- */
  .navtabs{
    display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:14px 0 18px;
  }
  .navtab{
    background:rgba(63,240,232,0.06); border:1px solid var(--panel-edge); color:var(--dim);
    padding:9px 18px; border-radius:20px; font-size:12px; letter-spacing:2px; font-weight:700;
    text-decoration:none; cursor:pointer; transition:all .15s; font-family:var(--font-display);
  }
  .navtab.active{ background:rgba(63,240,232,0.16); color:var(--cyan); border-color:rgba(63,240,232,0.5); }
  .navtab:not(.active):hover{ background:rgba(255,255,255,0.06); }

  /* ---------- main two-column layout ---------- */
  .interface{
    display:grid; grid-template-columns: 260px 1fr; gap:22px; align-items:start;
  }
  @media (max-width:760px){
    .interface{ grid-template-columns: 1fr; }
  }

  .panel{
    background:linear-gradient(180deg, rgba(27,31,69,0.4), rgba(13,15,34,0.55));
    border:1px solid var(--panel-edge); border-radius:10px; padding:16px;
    position:relative;
  }

  /* ---------- device column ---------- */
  .device-col{ display:flex; flex-direction:column; align-items:center; }
  .avatar-wrap{ position:relative; width:100%; max-width:200px; margin:6px auto 8px; display:flex; justify-content:center; }
  .avatar-glow{
    position:absolute; inset:-26px; border-radius:26px;
    background:radial-gradient(circle, rgba(63,240,232,0.35), transparent 70%);
    filter:blur(10px); opacity:0.5; transition:opacity .25s, transform .25s;
  }
  .avatar-wrap.speaking .avatar-glow{ opacity:1; animation:glowPulse .5s ease-in-out infinite; }
  .avatar-wrap.listening .avatar-glow{ opacity:0.85; background:radial-gradient(circle, rgba(240,168,48,0.4), transparent 70%); animation:glowPulse .7s ease-in-out infinite; }
  @keyframes glowPulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.12);} }
  .avatar-img{
    width:100%; border-radius:18px; display:block;
    box-shadow:0 0 0 1px var(--panel-edge), 0 18px 40px rgba(0,0,0,0.6);
    animation: breathe 4s ease-in-out infinite; position:relative; z-index:1;
  }
  .avatar-wrap.speaking .avatar-img{ animation: speakBob .35s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.015);} }
  @keyframes speakBob{ 0%,100%{ transform:scale(1.02) translateY(0);} 50%{ transform:scale(1.045) translateY(-2px);} }

  .status-line{ margin-top:10px; font-size:11px; letter-spacing:2px; color:var(--dim); text-align:center; min-height:16px; }
  .status-line.active{ color:var(--cyan); }

  #micBtn{
    margin:16px auto 4px; width:82px; height:82px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #6b4fe6, var(--core-purple) 60%, #1a1140 100%);
    border:2px solid rgba(63,240,232,0.5); box-shadow:0 0 22px rgba(75,47,214,0.7);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    user-select:none; -webkit-user-select:none; transition:transform .15s; flex:none;
  }
  #micBtn:active{ transform:scale(0.94); }
  #micBtn svg{ width:32px; height:32px; fill:var(--white); }
  #micBtn.listening{
    background:radial-gradient(circle at 35% 30%, #ffcf7a, var(--gold) 60%, #7a4d0f 100%);
    box-shadow:0 0 30px rgba(240,168,48,0.85); animation:micPulse .8s ease-in-out infinite;
  }
  @keyframes micPulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.08);} }
  .mic-label{ text-align:center; font-size:11px; letter-spacing:2px; color:var(--dim); margin-bottom:4px; }
  #gearBtn{
    margin-top:14px; background:rgba(63,240,232,0.08); border:1px solid var(--panel-edge); color:var(--dim);
    border-radius:8px; padding:8px 14px; font-size:14px; cursor:pointer; width:100%;
  }

  /* ---------- chat column ---------- */
  .chat-col{ display:flex; flex-direction:column; min-height:520px; }
  .chat-col h2{
    margin:0 0 12px; font-size:13px; letter-spacing:3px; color:var(--cyan);
    font-family:var(--font-display); font-weight:700;
  }

  .quick-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .quick-btn{
    background:rgba(139,123,255,0.1); border:1px solid var(--panel-edge); color:var(--white);
    padding:10px 14px; border-radius:20px; font-size:13px; letter-spacing:0.5px; cursor:pointer;
    font-family:var(--font-display);
  }
  .quick-btn:active{ background:rgba(63,240,232,0.2); }

  #chatLog{
    flex:1; display:flex; flex-direction:column; gap:14px; overflow-y:auto;
    max-height:480px; padding-right:4px; margin-bottom:14px;
  }
  .bubble{
    max-width:88%; padding:14px 16px; border-radius:16px; font-size:19px; line-height:1.4;
    font-family:var(--font-display); font-weight:600; word-break:break-word;
  }
  .bubble.tobot{
    align-self:flex-start; background:rgba(75,47,214,0.22); border:1px solid rgba(139,123,255,0.4);
    border-bottom-left-radius:4px; color:var(--white);
  }
  .bubble.garrett{
    align-self:flex-end; background:rgba(63,240,232,0.14); border:1px solid rgba(63,240,232,0.4);
    border-bottom-right-radius:4px; color:var(--white);
  }
  .bubble .who{ display:block; font-size:11px; letter-spacing:2px; color:var(--dim); margin-bottom:4px; font-family:var(--font-mono); }
  .bubble.tobot .who{ color:var(--cyan); }
  .bubble.garrett .who{ color:var(--gold); }
  .bubble.interim{ opacity:0.55; font-style:italic; }

  /* ---------- text input row ---------- */
  .type-row{ display:flex; gap:8px; margin-top:auto; }
  #typeInput{
    flex:1; background:rgba(255,255,255,0.05); border:1px solid var(--panel-edge);
    color:var(--white); padding:14px 16px; border-radius:24px; font-size:17px;
    font-family:var(--font-display); outline:none;
  }
  #typeInput:focus{ border-color:rgba(63,240,232,0.5); }
  #sendBtn{
    background:var(--cyan); color:#04201f; border:none; border-radius:24px; padding:0 22px;
    font-weight:700; font-size:14px; letter-spacing:1px; cursor:pointer; font-family:var(--font-display);
  }
  #sendBtn:active{ transform:scale(0.96); }

  /* ---------- settings overlay ---------- */
  #settingsOverlay{
    position:fixed; inset:0; background:rgba(5,5,12,0.88); display:none;
    align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  #settingsOverlay.open{ display:flex; }
  .settings-box{
    background:var(--panel); border:1px solid var(--panel-edge); border-radius:12px;
    padding:22px; width:100%; max-width:420px;
  }
  .settings-box h3{ margin:0 0 14px; font-size:16px; letter-spacing:1px; color:var(--cyan); }
  .settings-box label{ display:block; font-size:12px; letter-spacing:1px; color:var(--dim); margin:14px 0 6px; }
  .settings-box input[type=text], .settings-box input[type=range]{
    width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--panel-edge);
    color:var(--white); padding:10px; border-radius:8px; font-family:var(--font-mono); font-size:13px;
  }
  .settings-box .row{ display:flex; gap:10px; margin-top:18px; }
  .settings-box button{
    flex:1; padding:12px; border-radius:8px; border:none; font-weight:700; letter-spacing:1px;
    cursor:pointer; font-family:var(--font-display);
  }
  #saveSettings{ background:var(--cyan); color:#04201f; }
  #closeSettings{ background:rgba(255,255,255,0.08); color:var(--white); }
  #clearChat{ background:rgba(255,80,80,0.15); color:#ff8080; border:1px solid rgba(255,80,80,0.3); margin-top:10px; width:100%; padding:10px; border-radius:8px; font-family:var(--font-display); cursor:pointer; }
  .settings-note{ font-size:11px; color:var(--dim); line-height:1.5; margin-top:14px; }
</style>
</head>

  <div class="settings-box">
    <h3>&#9881; VOICE LINK SETTINGS</h3>
    <label>Relay URL (from your Cloudflare Worker)</label>
    <input type="text" id="relayUrl" placeholder="https://tobot-relay.yourname.workers.dev">
    <label>Tobot voice pitch</label>
    <input type="range" id="pitchRange" min="0.6" max="1.6" step="0.05" value="1">
    <label>Tobot voice speed</label>
    <input type="range" id="rateRange" min="0.7" max="1.3" step="0.05" value="0.95">
    <div class="row">
      <button id="closeSettings">Close</button>
      <button id="saveSettings">Save</button>
    </div>
    <button id="clearChat">Clear Chat History</button>
    <div class="settings-note">
      This page never stores your Kindroid key — that lives only
      in your Cloudflare Worker. Garrett only ever talks to your Worker.
    </div>
  </div>
</div>

<script>
  const avatarWrap = document.getElementById('avatarWrap');
  const statusLine = document.getElementById('statusLine');
  const micBtn = document.getElementById('micBtn');
  const chatLog = document.getElementById('chatLog');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const relayUrlInput = document.getElementById('relayUrl');
  const pitchRange = document.getElementById('pitchRange');
  const rateRange = document.getElementById('rateRange');
  const typeInput = document.getElementById('typeInput');
  const sendBtn = document.getElementById('sendBtn');

  document.getElementById('missionTab').onclick = (e)=>{ e.preventDefault(); alert('Mission HUD is coming soon!'); };
  document.getElementById('hangarTab').onclick = (e)=>{ e.preventDefault(); alert('Hangar is coming soon!'); };

  function loadSettings(){
    relayUrlInput.value = localStorage.getItem('tobot_relay_url') || '';
    pitchRange.value = localStorage.getItem('tobot_pitch') || '1';
    rateRange.value = localStorage.getItem('tobot_rate') || '0.95';
  }
  function saveSettings(){
    localStorage.setItem('tobot_relay_url', relayUrlInput.value.trim());
    localStorage.setItem('tobot_pitch', pitchRange.value);
    localStorage.setItem('tobot_rate', rateRange.value);
  }
  loadSettings();

  document.getElementById('gearBtn').onclick = ()=> settingsOverlay.classList.add('open');
  document.getElementById('closeSettings').onclick = ()=> settingsOverlay.classList.remove('open');
  document.getElementById('saveSettings').onclick = ()=>{ saveSettings(); settingsOverlay.classList.remove('open'); };
  document.getElementById('clearChat').onclick = ()=>{
    chatLog.innerHTML='';
    localStorage.removeItem('tobot_chat_history');
  };

  function loadHistory(){
    try{
      const h = JSON.parse(localStorage.getItem('tobot_chat_history') || '[]');
      h.forEach(m => addBubble(m.who, m.text, false));
    }catch(e){}
  }
  function saveHistoryEntry(who, text){
    try{
      const h = JSON.parse(localStorage.getItem('tobot_chat_history') || '[]');
      h.push({who, text});
      while(h.length > 40) h.shift();
      localStorage.setItem('tobot_chat_history', JSON.stringify(h));
    }catch(e){}
  }

  function addBubble(who, text, persist){
    const b = document.createElement('div');
    b.className = 'bubble ' + (who === 'garrett' ? 'garrett' : 'tobot');
    const label = who === 'garrett' ? 'GARRETT' : 'TOBOT G-FORCE';
    b.innerHTML = '<span class="who">'+label+'</span>' + text;
    chatLog.appendChild(b);
    chatLog.scrollTop = chatLog.scrollHeight;
    if(persist !== false) saveHistoryEntry(who, text);
    return b;
  }
  loadHistory();

  let voices = [];
  function loadVoices(){ voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
  if(window.speechSynthesis){ loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }
function pickVoice(){
  return voices.find(v => v.name === "Zarvox")
      || voices.find(v => /en-US/i.test(v.lang) && /male|david|guy|mark/i.test(v.name))
      || voices.find(v => /en/i.test(v.lang))
      || voices[0];
}
  function stripSymbolsForSpeech(text){
    return text
      .replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}\u{2B00}-\u{2BFF}\u{FE0F}\u{200D}]/gu, '')
      .replace(/\s{2,}/g, ' ')
      .trim();
  }

  function speak(text){
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(stripSymbolsForSpeech(text));
    const v = pickVoice();
    if(v) u.voice = v;
    u.pitch = parseFloat(pitchRange.value || '1');
    u.rate = parseFloat(rateRange.value || '0.95');
    u.onstart = ()=>{ avatarWrap.classList.add('speaking'); statusLine.textContent='TOBOT IS TALKING...'; statusLine.classList.add('active'); };
    u.onend = ()=>{ avatarWrap.classList.remove('speaking'); statusLine.textContent='TAP MIC TO TALK'; statusLine.classList.remove('active'); };
    window.speechSynthesis.speak(u);
  }

  async function sendToTobot(message){
    addBubble('garrett', message);
    const url = (localStorage.getItem('tobot_relay_url')||'').trim();
    if(!url){
      addBubble('tobot', "My grown-up still needs to connect my Voice Link in Settings! Tap the gear icon. \u2699\ufe0f");
      return;
    }
    const thinking = addBubble('tobot', 'thinking...', false);
    thinking.classList.add('interim');
    statusLine.textContent = 'TOBOT IS THINKING...';
    statusLine.classList.add('active');
    try{
      const resp = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message })
      });
      const text = await resp.text();
      thinking.remove();
      const clean = text && text.trim() ? text.trim() : "Hmm, I didn't catch that. Can you say it again?";
      addBubble('tobot', clean);
      speak(clean);
    }catch(e){
      thinking.remove();
      const fallback = "My signal's a little glitchy right now! Try again in a bit.";
      addBubble('tobot', fallback);
      speak(fallback);
    }
  }

  document.getElementById('quickRow').addEventListener('click', (e)=>{
    const btn = e.target.closest('.quick-btn');
    if(!btn) return;
    if(btn.dataset.focus){ typeInput.focus(); return; }
    sendToTobot(btn.dataset.say);
  });

  function submitTyped(){
    const val = typeInput.value.trim();
    if(!val) return;
    typeInput.value = '';
    sendToTobot(val);
  }
  sendBtn.addEventListener('click', submitTyped);
  typeInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') submitTyped(); });

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognizer = null;
  let interimBubble = null;
  let recognizing = false;

  if(SR){
    recognizer = new SR();
    recognizer.lang = 'en-US';
    recognizer.continuous = false;
    recognizer.interimResults = true;

    recognizer.onstart = ()=>{
      recognizing = true;
      micBtn.classList.add('listening');
      avatarWrap.classList.add('listening');
      statusLine.textContent = 'LISTENING...';
      statusLine.classList.add('active');
      interimBubble = addBubble('garrett', '...', false);
      interimBubble.classList.add('interim');
    };
    recognizer.onresult = (event)=>{
      let text = '';
      for(let i=0;i<event.results.length;i++){ text += event.results[i][0].transcript; }
      if(interimBubble) interimBubble.innerHTML = '<span class="who">GARRETT</span>' + text;
    };
    recognizer.onerror = ()=>{
      if(interimBubble){ interimBubble.remove(); interimBubble=null; }
      statusLine.textContent = "COULDN'T HEAR YOU \u2014 TRY AGAIN";
      statusLine.classList.remove('active');
    };
    recognizer.onend = ()=>{
      recognizing = false;
      micBtn.classList.remove('listening');
      avatarWrap.classList.remove('listening');
      if(interimBubble){
        const finalText = interimBubble.textContent.replace('GARRETT','').trim();
        interimBubble.remove();
        interimBubble = null;
        if(finalText && finalText !== '...'){
          sendToTobot(finalText);
        } else {
          statusLine.textContent = 'TAP MIC TO TALK';
          statusLine.classList.remove('active');
        }
      }
    };

    const startListening = (e)=>{ e.preventDefault(); if(!recognizing){ try{ recognizer.start(); }catch(err){} } };
    const stopListening = (e)=>{ e.preventDefault(); if(recognizing){ recognizer.stop(); } };
    micBtn.addEventListener('mousedown', startListening);
    micBtn.addEventListener('touchstart', startListening, {passive:false});
    micBtn.addEventListener('mouseup', stopListening);
    micBtn.addEventListener('touchend', stopListening, {passive:false});
    micBtn.addEventListener('mouseleave', stopListening);
  } else {
    document.querySelector('.mic-label').textContent = 'MIC NOT SUPPORTED \u2014 USE TEXT BOX';
    micBtn.style.opacity = '0.4';
    micBtn.style.pointerEvents = 'none';
  }
</script>
</body>
</html>
